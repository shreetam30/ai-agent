[project]
name = "jarvic-slm"
version = "0.1.0"
description = "Repo for small language model (SLM) training and evaluation."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
  "cryptography==46.0.5",
  "cupy-cuda12x==14.0.1",
  "email-validator==2.3.0",
  "fastapi-cli==0.0.24",
  "fastapi-cloud-cli==0.14.1",
  "fqdn==1.5.1",
  "httptools==0.7.1",
  "isoduration==20.11.0",
  "jupyter==1.1.1",
  "langchain==1.2.10",
  "langchain-community==0.4.1",
  "langchain-ollama==1.0.1",
  "langchain-openai==1.0.0",
  "pycountry==26.2.16",
  "rfc3987-syntax==1.1.0",
  "tinycss2==1.4.0",
  "uri-template==1.3.0",
  "uvloop==0.22.1",
  "vllm==0.17.0",
  "webcolors==25.10.0",
  "websockets==16.0",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.uv]
package = false

[tool.hatch.build.targets.wheel]
packages = ["src/jarvic_slm"]
